<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>使用者點數管理</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .pts-badge { background-color: #8a9a90; color: white; padding: 5px 10px; border-radius: 20px; font-weight: bold; }
        .input-group-sm { width: 150px; }
    </style>
</head>
<body style="background: #eff2f0;">
    <div class="container mt-5">
        <div class="d-flex justify-content-between mb-4">
            <h2 style="color: #5b6b61;">👤 使用者權限與點數管理</h2>
            <a href="/" class="btn btn-outline-secondary">回首頁</a>
        </div>
        
        <div class="card shadow-sm"><div class="card-body p-0">
            <table class="table table-hover mb-0 align-middle">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>名稱</th>
                        <th>目前點數</th>
                        <th>點數調整</th>
                        <th>註冊時間</th>
                        <th>管理操作</th>
                    </tr>
                </thead>
                <tbody>
                    {% for c in customers %}
                    <tr>
                        <td>{{ c.id }}</td>
                        <td>{{ c.username or '未設定' }}</td>
                        <td><span class="pts-badge">{{ c.j_pts }} P</span></td>
                        <td>
                            <form action="/customer/adjust_pts/{{ c.id }}" method="POST" class="d-flex gap-2">
                                <input type="number" name="amount" class="form-control form-control-sm" style="width: 80px;" placeholder="+/-">
                                <button type="submit" class="btn btn-sm btn-success">更新</button>
                            </form>
                        </td>
                        <td><small>{{ c.created_at }}</small></td>
                        <td>
                            <form action="/customer/delete/{{ c.id }}" method="POST" class="d-inline" onsubmit="return confirm('確定刪除此使用者？');">
                                <button type="submit" class="btn btn-sm btn-danger">刪除</button>
                            </form>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div></div>
    </div>
</body>
</html>
