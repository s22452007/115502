<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>JLens 管理者登入</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { height: 100vh; display: flex; font-family: "微軟正黑體", sans-serif; }

        /* ===== 左側品牌區 ===== */
        .brand-side {
            width: 45%;
            background: linear-gradient(150deg, #3a6644 0%, #4a7a54 60%, #3f7049 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 60px 56px;
            position: relative;
            overflow: hidden;
        }

        /* 裝飾圓形 */
        .brand-side::before {
            content: '';
            position: absolute;
            width: 420px; height: 420px;
            border-radius: 50%;
            background: rgba(255,255,255,0.05);
            top: -120px; right: -120px;
        }
        .brand-side::after {
            content: '';
            position: absolute;
            width: 280px; height: 280px;
            border-radius: 50%;
            background: rgba(255,255,255,0.04);
            bottom: -80px; left: -80px;
        }
        .brand-deco-dot {
            position: absolute;
            width: 160px; height: 160px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.07);
            bottom: 120px; right: -60px;
        }
        .brand-deco-dot2 {
            position: absolute;
            width: 80px; height: 80px;
            border-radius: 50%;
            background: rgba(255,255,255,0.06);
            top: 200px; right: 40px;
        }

        .brand-logo {
            width: 68px; height: 68px;
            background: rgba(255,255,255,0.15);
            border-radius: 18px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.8rem;
            color: white;
            margin-bottom: 36px;
            position: relative; z-index: 1;
        }
        .brand-tag {
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 4px;
            color: rgba(255,255,255,0.45);
            text-transform: uppercase;
            margin-bottom: 14px;
            position: relative; z-index: 1;
        }
        .brand-title {
            font-size: 3.4rem;
            font-weight: 900;
            color: white;
            line-height: 1.05;
            letter-spacing: -1.5px;
            margin-bottom: 14px;
            position: relative; z-index: 1;
        }
        .brand-subtitle {
            font-size: 0.95rem;
            color: rgba(255,255,255,0.55);
            line-height: 1.7;
            margin-bottom: 40px;
            position: relative; z-index: 1;
        }
        .brand-divider {
            width: 40px;
            height: 3px;
            background: rgba(255,255,255,0.25);
            border-radius: 2px;
            margin-bottom: 28px;
            position: relative; z-index: 1;
        }
        .brand-features {
            display: flex;
            flex-direction: column;
            gap: 14px;
            position: relative; z-index: 1;
        }
        .brand-feature {
            display: flex;
            align-items: center;
            gap: 14px;
            color: rgba(255,255,255,0.75);
            font-size: 0.88rem;
        }
        .brand-feature-icon {
            width: 34px; height: 34px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.95rem;
            color: white;
            flex-shrink: 0;
        }

        /* ===== 右側表單區 ===== */
        .form-side {
            flex: 1;
            background: #f2f4f3;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px 48px;
        }
        .form-box {
            width: 100%;
            max-width: 360px;
        }
        .form-heading {
            font-size: 1.8rem;
            font-weight: 900;
            color: #1a1a1a;
            margin-bottom: 6px;
        }
        .form-subheading {
            font-size: 0.85rem;
            color: #aaa;
            margin-bottom: 36px;
        }
        .field-label {
            font-size: 0.78rem;
            font-weight: 700;
            color: #888;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }
        .form-control, .form-select {
            background: white;
            border: 1.5px solid #e8e8e8;
            border-radius: 12px;
            padding: 12px 16px;
            font-size: 0.92rem;
            color: #333;
            transition: border-color 0.2s;
        }
        .form-control:focus, .form-select:focus {
            border-color: #4a7a54;
            box-shadow: 0 0 0 3px rgba(74,122,84,0.12);
        }
        .input-group .form-control {
            border-radius: 12px 0 0 12px;
            border-right: none;
        }
        .input-group .btn {
            border-radius: 0 12px 12px 0;
            border: 1.5px solid #e8e8e8;
            border-left: none;
            background: white;
            color: #999;
        }
        .input-group .form-control:focus ~ .btn {
            border-color: #4a7a54;
        }
        .btn-login {
            width: 100%;
            padding: 14px;
            background: #4a7a54;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 800;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 8px;
        }
        .btn-login:hover { background: #3d6645; }
        .error-box {
            background: #fce4ec;
            color: #c2185b;
            border-radius: 10px;
            padding: 10px 16px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <!-- 左側品牌區 -->
    <div class="brand-side">
        <div class="brand-deco-dot"></div>
        <div class="brand-deco-dot2"></div>

        <div class="brand-logo"><i class="bi bi-camera-fill"></i></div>
        <div class="brand-tag">Admin Panel</div>
        <div class="brand-title">JLens<br>後台系統</div>
        <div class="brand-subtitle">日語學習平台管理中心<br>全面掌握使用者與學習資料</div>
        <div class="brand-divider"></div>
        <div class="brand-features">
            <div class="brand-feature">
                <div class="brand-feature-icon"><i class="bi bi-people-fill"></i></div>
                <span>使用者資料與點數管理</span>
            </div>
            <div class="brand-feature">
                <div class="brand-feature-icon"><i class="bi bi-book-fill"></i></div>
                <span>教材單字與測驗題目</span>
            </div>
            <div class="brand-feature">
                <div class="brand-feature-icon"><i class="bi bi-chat-dots-fill"></i></div>
                <span>意見回饋即時回覆</span>
            </div>
            <div class="brand-feature">
                <div class="brand-feature-icon"><i class="bi bi-image-fill"></i></div>
                <span>照片審核與內容管控</span>
            </div>
        </div>
    </div>

    <!-- 右側表單區 -->
    <div class="form-side">
        <div class="form-box">
            <div class="form-heading">歡迎回來</div>
            <div class="form-subheading">請選擇帳號並輸入密碼</div>

            {% if error %}
            <div class="error-box"><i class="bi bi-exclamation-circle me-1"></i>{{ error }}</div>
            {% endif %}

            <form action="{{ url_for('admin_login') }}" method="POST">
                <div class="mb-4">
                    <div class="field-label">管理者帳號</div>
                    <select name="username" class="form-select" required autofocus>
                        <option value="" disabled selected>請選擇帳號...</option>
                        <option value="11156001">11156001</option>
                        <option value="11156006">11156006</option>
                        <option value="11156015">11156015</option>
                        <option value="11156039">11156039</option>
                        <option value="11156047">11156047</option>
                    </select>
                </div>

                <div class="mb-4">
                    <div class="field-label">密碼</div>
                    <div class="input-group">
                        <input type="password" name="password" id="adminPassword"
                               class="form-control" placeholder="輸入密碼" required>
                        <button class="btn" type="button" id="togglePassword">
                            <i id="eyeIcon" class="bi bi-eye-slash-fill"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn-login">登入系統</button>
            </form>
        </div>
    </div>

    <script>
        const toggleBtn = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('adminPassword');
        const eyeIcon = document.getElementById('eyeIcon');
        toggleBtn.addEventListener('click', function () {
            const isPassword = passwordInput.getAttribute('type') === 'password';
            passwordInput.setAttribute('type', isPassword ? 'text' : 'password');
            eyeIcon.className = isPassword ? 'bi bi-eye-fill' : 'bi bi-eye-slash-fill';
        });
    </script>
</body>
</html>
