<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>照片管控</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --snap-green-dark: #5c8364;
            --snap-green-light: #dce7de;
        }
        body { background-color: #f4f7f5; font-family: "微軟正黑體"; }
        .page-title { color: var(--snap-green-dark); font-weight: bold; }
        
        /* 表格樣式優化 */
        .card { border: none; border-radius: 15px; overflow: hidden; }
        .table thead { background-color: var(--snap-green-dark); color: white; }
        .table tbody tr:hover { background-color: var(--snap-green-light); }
        
        /* 標籤樣式 */
        .scene-badge { 
            background-color: var(--snap-green-light); 
            color: var(--snap-green-dark); 
            padding: 5px 12px; border-radius: 50px; font-size: 0.85rem; font-weight: bold;
        }
        
        /* 刪除按鈕 */
        .btn-outline-danger { 
            border-color: #e0a4a4; color: #b85c5c; border-radius: 50px; 
        }
        .btn-outline-danger:hover { background-color: #b85c5c; color: white; }
    </style>
</head>
<body>
    <div class="container mt-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="page-title">🖼️ 相簿照片監控</h3>
            <a href="/" class="btn btn-sm btn-outline-secondary" style="border-radius: 50px;">返回儀表板</a>
        </div>

        <div class="card shadow-sm">
            <div class="card-body p-0">
                <table class="table table-hover mb-0 align-middle">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>上傳者</th>
                            <th>分類場劇</th>
                            <th>自訂相簿標題</th>
                            <th>上傳時間</th>
                            <th>強制管理</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for p in photos %}
                        <tr>
                            <td>{{ p.id }}</td>
                            <td class="fw-bold">{{ p.username or '未知使用者' }}</td>
                            <td><span class="scene-badge">{{ p.scene_name or '未分類' }}</span></td>
                            <td>{{ p.custom_title or '（無標題）' }}</td>
                            <td><small class="text-muted">{{ p.created_at }}</small></td>
                            <td>
                                <form action="/photo/delete/{{ p.id }}" method="POST" onsubmit="return confirm('警告：確定要永久刪除這張照片嗎？');">
                                    <button type="submit" class="btn btn-sm btn-outline-danger px-3">強制刪除</button>
                                </form>
                            </td>
                        </tr>
                        {% else %}
                        <tr>
                            <td colspan="6" class="text-center py-5 text-muted">目前尚無照片上傳紀錄</td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
