<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>教材單字管理</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --snap-green-dark: #5c8364; --snap-green-light: #dce7de; }
        body { background-color: #f4f7f5; font-family: "微軟正黑體"; text-align: left; }
        .page-title { color: var(--snap-green-dark); font-weight: bold; text-align: left; }
        .card { border: none; border-radius: 15px; overflow: hidden; }
        .table thead { background-color: var(--snap-green-dark); color: white; }
        .table tbody tr:hover { background-color: var(--snap-green-light); }
        .scene-badge { background-color: var(--snap-green-light); color: var(--snap-green-dark); padding: 4px 12px; border-radius: 50px; font-weight: bold; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div class="container mt-5">
        <div class="mb-4">
            <h3 class="page-title">📖 教材單字庫管理</h3>
            <p class="text-muted">管理 App 內建的日語詞彙、假名及分級例句 。</p>
            <a href="/" class="btn btn-sm btn-outline-secondary" style="border-radius: 50px;">返回儀表板</a>
        </div>

        <div class="card shadow-sm">
            <div class="card-body p-0 text-start">
                <table class="table table-hover mb-0 align-middle">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>單字 (漢字)</th>
                            <th>假名 (拼音)</th>
                            <th>中文解釋</th>
                            <th>所屬場景</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for v in vocabs %}
                        <tr>
                            <td>{{ v.id }}</td>
                            <td class="fw-bold">{{ v.word }} </td>
                            <td>{{ v.kana }} </td>
                            <td>{{ v.meaning }} </td>
                            <td><span class="scene-badge">{{ v.scene_name or '通用' }} </span></td>
                            <td>
                                <form action="/vocab/delete/{{ v.id }}" method="POST" onsubmit="return confirm('確定要刪除這個單字嗎？');" class="d-inline">
                                    <button type="submit" class="btn btn-sm btn-outline-danger" style="border-radius: 50px;">刪除</button>
                                </form>
                            </td>
                        </tr>
                        {% else %}
                        <tr>
                            <td colspan="6" class="text-center py-5 text-muted">目前教材庫中尚無單字</td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
