<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>JLens 管理者登入</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f5; height: 100vh; display: flex; align-items: center; justify-content: center;}
        .login-card { width: 100%; max-width: 400px; padding: 2rem; border-radius: 15px; background: white; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .btn-snap { background-color: #5c8364; color: white; border: none; }
        .btn-snap:hover { background-color: #4a6b51; color: white; }
        
        /* 🌟 新增：讓下拉選單與輸入框點擊時，外框發出 JLens 專屬綠色光暈 */
        .form-select:focus, .form-control:focus {
            border-color: #5c8364;
            box-shadow: 0 0 0 0.25rem rgba(92, 131, 100, 0.25);
        }
        /* 🌟 微調眼睛按鈕的滑鼠懸停效果 */
        #togglePassword:hover {
            background-color: #f4f7f5;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h3 class="text-center mb-4 fw-bold" style="color: #5c8364;">JLens Admin</h3>
        
        {% if error %}
        <div class="alert alert-danger py-2 text-center">{{ error }}</div>
        {% endif %}
        
        <form action="{{ url_for('admin_login') }}" method="POST">
            
            <div class="mb-3">
                <label class="form-label text-muted fw-bold">選擇管理者身分</label>
                <select name="username" class="form-select form-select-lg" required autofocus>
                    <option value="" disabled selected>請選擇您的帳號...</option>
                    <option value="11156001">11156001 (組員)</option>
                    <option value="11156006">11156006 (組員)</option>
                    <option value="11156015">11156015 (組員)</option>
                    <option value="11156039">11156039 (組員)</option>
                    <option value="11156047">11156047 (組員)</option>
                </select>
            </div>
            
            <div class="mb-4">
                <label class="form-label text-muted fw-bold">密碼</label>
                <div class="input-group">
                    <input type="password" name="password" id="adminPassword" class="form-control" placeholder="請輸入密碼" required>
                    <button class="btn btn-outline-secondary" type="button" id="togglePassword" style="border-color: #dce7de; color: #5c8364;">
                        <span id="eyeIcon">👁️</span>
                    </button>
                </div>
            </div>
            
            <button type="submit" class="btn btn-snap w-100 py-2 fw-bold fs-5">登入系統</button>
        </form>
    </div>

    <script>
        document.getElementById('togglePassword').addEventListener('click', function () {
            const passwordInput = document.getElementById('adminPassword');
            const eyeIcon = document.getElementById('eyeIcon');
            
            // 判斷目前的類型，如果是 password 就改成 text，反之亦然
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.textContent = '🙈'; // 變成閉眼
            } else {
                passwordInput.type = 'password';
                eyeIcon.textContent = '👁️'; // 變成睜眼
            }
        });
    </script>
</body>
</html>
