<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>JLens 管理者 — 重設密碼</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { height: 100vh; display: flex; font-family: "微軟正黑體", sans-serif; overflow: hidden; }

        .brand-side {
            width: 46%;
            background: linear-gradient(150deg, #3d7a52 0%, #1e4d30 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 64px 56px;
            position: relative;
            overflow: hidden;
        }
        .brand-side::before {
            content: '';
            position: absolute;
            width: 420px; height: 420px;
            border-radius: 50%;
            background: rgba(255,255,255,0.05);
            top: -140px; right: -140px;
        }
        .brand-side::after {
            content: '';
            position: absolute;
            width: 280px; height: 280px;
            border-radius: 50%;
            background: rgba(0,0,0,0.12);
            bottom: -80px; left: -80px;
        }

        .form-side {
            flex: 1;
            background: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px 56px;
        }
        .form-box {
            width: 100%;
            max-width: 340px;
        }
        .form-hello {
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 2px;
            color: #4a7a54;
            text-transform: uppercase;
            margin-bottom: 8px;
        }
        .form-heading {
            font-size: 1.75rem;
            font-weight: 900;
            color: #111;
            letter-spacing: -0.5px;
            margin-bottom: 6px;
            line-height: 1.1;
        }
        .form-subheading {
            font-size: 0.83rem;
            color: #bbb;
            margin-bottom: 40px;
        }
        .field-label {
            font-size: 0.72rem;
            font-weight: 700;
            color: #aaa;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }
        .form-control, .form-select {
            background: #f8f9f8;
            border: 1.5px solid #eee;
            border-radius: 10px;
            padding: 12px 15px;
            font-size: 0.9rem;
            color: #222;
            transition: border-color 0.2s, background 0.2s;
        }
        .form-control:focus, .form-select:focus {
            background: white;
            border-color: #4a7a54;
            box-shadow: 0 0 0 3px rgba(74,122,84,0.1);
            outline: none;
        }
        .input-group .form-control {
            border-radius: 10px 0 0 10px;
            border-right: none;
        }
        .input-group .btn-eye {
            border-radius: 0 10px 10px 0;
            border: 1.5px solid #eee;
            border-left: none;
            background: #f8f9f8;
            color: #ccc;
            padding: 0 14px;
            transition: color 0.2s, background 0.2s;
        }
        .input-group .form-control:focus ~ .btn-eye {
            border-color: #4a7a54;
            background: white;
        }
        .btn-eye:hover { color: #888; }

        .btn-submit {
            width: 100%;
            padding: 13px;
            background: #2d5a3d;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 800;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 6px;
        }
        .btn-submit:hover { background: #244d33; }

        .error-box {
            background: #fff5f5;
            color: #e53e3e;
            border: 1px solid #fed7d7;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 0.82rem;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .success-box {
            background: #f0fff4;
            color: #276749;
            border: 1px solid #c6f6d5;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 0.82rem;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            font-size: 0.78rem;
            color: #aaa;
            text-decoration: none;
        }
        .back-link:hover { color: #4a7a54; }
        .form-footer {
            margin-top: 36px;
            padding-top: 20px;
            border-top: 1px solid #f0f0f0;
            font-size: 0.72rem;
            color: #ddd;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="brand-side"></div>

    <div class="form-side">
        <div class="form-box">
            <div class="form-hello">Password Reset</div>
            <div class="form-heading">重設密碼</div>
            <div class="form-subheading">選擇帳號並設定新密碼</div>

            {% if error %}
            <div class="error-box">
                <i class="bi bi-exclamation-circle-fill"></i>{{ error }}
            </div>
            {% endif %}

            {% if success %}
            <div class="success-box">
                <i class="bi bi-check-circle-fill"></i>{{ success }}
            </div>
            {% endif %}

            {% if not success %}
            <form method="POST">
                <div class="mb-4">
                    <div class="field-label">帳號</div>
                    <select name="username" class="form-select" required autofocus>
                        <option value="" disabled selected>選擇管理者帳號...</option>
                        <option value="11156001">11156001</option>
                        <option value="11156006">11156006</option>
                        <option value="11156015">11156015</option>
                        <option value="11156039">11156039</option>
                        <option value="11156047">11156047</option>
                    </select>
                </div>

                <div class="mb-4">
                    <div class="field-label">新密碼</div>
                    <div class="input-group">
                        <input type="password" name="new_password" id="newPw"
                               class="form-control" placeholder="輸入新密碼（至少 6 碼）" required>
                        <button class="btn btn-eye" type="button" onclick="togglePw('newPw','eye1')">
                            <i id="eye1" class="bi bi-eye-slash-fill"></i>
                        </button>
                    </div>
                </div>

                <div class="mb-4">
                    <div class="field-label">確認新密碼</div>
                    <div class="input-group">
                        <input type="password" name="confirm_password" id="confirmPw"
                               class="form-control" placeholder="再次輸入新密碼" required>
                        <button class="btn btn-eye" type="button" onclick="togglePw('confirmPw','eye2')">
                            <i id="eye2" class="bi bi-eye-slash-fill"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn-submit">重設密碼</button>
            </form>
            {% else %}
            <a href="{{ url_for('admin_login') }}" class="btn-submit" style="display:block; text-align:center; text-decoration:none; padding:13px;">
                返回登入
            </a>
            {% endif %}

            <a href="{{ url_for('admin_login') }}" class="back-link">← 返回登入頁面</a>
            <div class="form-footer">© 2026 JLens Project Team · 管理者專用</div>
        </div>
    </div>

    <script>
        function togglePw(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            const isPass = input.type === 'password';
            input.type = isPass ? 'text' : 'password';
            icon.className = isPass ? 'bi bi-eye-fill' : 'bi bi-eye-slash-fill';
        }
    </script>
</body>
</html>
