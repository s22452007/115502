<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>使用者管理</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f5; }
        .table thead { background-color: #5c8364; color: white; }
        .pts-tag { background-color: #dce7de; color: #5c8364; font-weight: bold; padding: 4px 12px; border-radius: 50px; }
        .btn-update { background-color: #5c8364; color: white; border: none; }
    </style>
</head>
<body>
    <div class="container mt-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 style="color: #5c8364;">👤 使用者點數管理</h3>
            <a href="/" class="btn btn-sm btn-outline-secondary">返回儀表板</a>
        </div>
        <div class="card shadow-sm"><div class="card-body p-0">
            <table class="table table-hover mb-0 align-middle">
                <thead>
                    <tr><th>ID</th><th>名稱</th><th>目前點數</th><th>快速調整點數</th><th>管理</th></tr>
                </thead>
                <tbody>
                    {% for c in customers %}
                    <tr>
                        <td>{{ c.id }}</td>
                        <td>{{ c.username or '未設定' }}</td>
                        <td><span class="pts-tag">{{ c.j_pts }} P</span></td>
                        <td>
                            <form action="/customer/adjust_pts/{{ c.id }}" method="POST" class="d-flex gap-2">
                                <input type="number" name="amount" class="form-control form-control-sm" style="width: 100px;" placeholder="+/- 點數">
                                <button type="submit" class="btn btn-sm btn-update">更新</button>
                            </form>
                        </td>
                        <td>
                            <form action="/customer/delete/{{ c.id }}" method="POST" onsubmit="return confirm('確定刪除？');">
                                <button type="submit" class="btn btn-sm btn-outline-danger">刪除</button>
                            </form>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div></div>
    </div>
</body>
</html>
