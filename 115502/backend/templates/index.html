<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>JLens Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --snap-green-dark: #5c8364;   /* 截圖主色：深灰綠 */
            --snap-green-light: #dce7de;  /* 背景點綴：淺灰綠 */
            --snap-bg: #f4f7f5;           /* 網頁底色 */
        }
        body { background-color: var(--snap-bg); font-family: "微軟正黑體", sans-serif; color: #444; }
        
        /* 儀表板卡片樣式 */
        .card { border: none; border-radius: 20px; box-shadow: 0 8px 30px rgba(0,0,0,0.05); }
        .card-header { 
            background-color: var(--snap-green-dark) !important; 
            color: white !important; 
            border-radius: 20px 20px 0 0 !important; 
            font-weight: bold; padding: 20px; 
            letter-spacing: 1px;
        }
        
        /* 統計方塊 - 靠左對齊調整 */
        .stat-box { 
            background: white; border-radius: 15px; padding: 20px; 
            border: 2px solid var(--snap-green-light); transition: 0.3s;
            text-align: left; /* 統計文字靠左 */
        }
        .stat-box:hover { transform: translateY(-5px); border-color: var(--snap-green-dark); }

        /* 統一按鈕樣式 - 靠左排列 */
        .btn-snap-unified { 
            background-color: var(--snap-green-dark); 
            color: white; 
            border: none; 
            border-radius: 50px; 
            padding: 12px 30px; 
            font-weight: 600; 
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
        }
        
        .btn-snap-unified:hover { 
            background-color: #4a6a51; 
            color: white; 
            transform: translateY(-3px); 
            box-shadow: 0 8px 15px rgba(92, 131, 100, 0.2); 
        }
    </style>
</head>
<body>
    <div class="container mt-5" style="max-width: 900px;"> <div class="d-flex align-items-center mb-4">
            <div style="width: 40px; height: 40px; background-color: var(--snap-green-light); border-radius: 10px; margin-right: 15px; display: flex; align-items: center; justify-content: center;">
                <span style="color: var(--snap-green-dark); font-weight: bold;">JL</span>
            </div>
            <h2 style="color: var(--snap-green-dark); font-weight: bold; margin: 0; letter-spacing: -1px;">snap to manage</h2>
        </div>
        
        <div class="row mb-5 g-3">
            <div class="col-md-4">
                <div class="stat-box">
                    <h6 class="text-muted mb-1" style="font-size: 0.9rem;">總使用者</h6>
                    <h3 style="color: var(--snap-green-dark); font-weight: bold; margin: 0;">{{ user_count }}</h3>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stat-box">
                    <h6 class="text-muted mb-1" style="font-size: 0.9rem;">上傳照片</h6>
                    <h3 style="color: var(--snap-green-dark); font-weight: bold; margin: 0;">{{ photo_count }}</h3>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stat-box">
                    <h6 class="text-muted mb-1" style="font-size: 0.9rem;">教材單字</h6>
                    <h3 style="color: var(--snap-green-dark); font-weight: bold; margin: 0;">{{ vocab_count }}</h3>
                </div>
            </div>
        </div>

        <div class="card shadow">
            <div class="card-header">
                ✦ 系統管理控制台
            </div>
            <div class="card-body p-4">
                <p class="text-muted mb-4" style="font-size: 1rem;">請選擇您要進行的管理項目：</p>
                
                <div class="d-flex flex-row gap-3">
                    <a href="/customer/list" class="btn btn-snap-unified">
                        👤 帳號與點數管理
                    </a>
                    
                    <a href="/photo/list" class="btn btn-snap-unified">
                        🖼️ 相簿照片監控
                    </a>
                    
                    <a href="/vocab/list" class="btn btn-snap-unified">
                        📖 教材單字管理
    </a>
                </div>
            </div>
        </div>
        
        <p class="mt-4 text-muted" style="font-size: 0.8rem; padding-left: 5px;">© 2026 JLens Project Team. All rights reserved.</p>
    </div>
</body>
</html>
