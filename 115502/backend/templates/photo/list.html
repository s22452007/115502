<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>照片管控</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="background: #eff2f0;">
    <div class="container mt-5">
        <div class="d-flex justify-content-between mb-4">
            <h2 style="color: #5b6b61;">🖼️ 照片與相簿管控</h2>
            <a href="/" class="btn btn-outline-secondary">回首頁</a>
        </div>
        <div class="card shadow-sm"><div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-dark"><tr><th>ID</th><th>上傳者</th><th>場景</th><th>標題</th><th>操作</th></tr></thead>
                <tbody>
                    {% for p in photos %}
                    <tr>
                        <td>{{ p.id }}</td><td>{{ p.username }}</td><td>{{ p.scene_name }}</td><td>{{ p.custom_title }}</td>
                        <td>
                            <form action="/photo/delete/{{ p.id }}" method="POST" class="d-inline" onsubmit="return confirm('確定永久刪除照片？');">
                                <button type="submit" class="btn btn-sm btn-danger">強制刪除</button>
                            </form>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div></div>
    </div>
</body>
</html>
