<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>JLens 點數管理</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* --- 基礎佈局樣式 --- */
        body { display: flex; background-color: #f4f7f5; margin: 0; min-height: 100vh; }
        .sidebar { width: 250px; background: white; box-shadow: 2px 0 5px rgba(0,0,0,0.05); position: sticky; top: 0; height: 100vh; }
        .sidebar-logo { padding: 20px; font-weight: bold; font-size: 1.2rem; color: #5c8364; display: flex; align-items: center; gap: 10px; }
        .icon-box { background: #e2ede5; padding: 5px 10px; border-radius: 8px; }
        .sidebar-menu { list-style: none; padding: 0; margin: 0; }
        .sidebar-menu li a { display: block; padding: 15px 20px; color: #555; text-decoration: none; }
        .sidebar-menu li a:hover, .sidebar-menu li a.active { background: #e2ede5; color: #5c8364; font-weight: bold; }
        .main-content { flex: 1; padding: 40px; }
        
        /* --- 這裡保留了您原本專屬的點數管理樣式 --- */
        .table thead { background-color: #5c8364; color: white; }
        .pts-tag { background-color: #dce7de; color: #5c8364; font-weight: bold; padding: 4px 12px; border-radius: 50px; }
        .btn-update { background-color: #5c8364; color: white; border: none; }
        .btn-update:hover { background-color: #4a6b51; color: white; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-logo">
            <div class="icon-box">JL</div>
            <div class="title">snap to manage</div>
        </div>
        <ul class="sidebar-menu">
            <li><a href="/dashboard">🏠 儀表板</a></li>
            <li><a href="/user/list">👤 使用者資料</a></li>
            <li><a href="/customer/list" class="active">💰 點數管理</a></li>
            <li><a href="/photo/list">🖼️ 照片管控</a></li>
            <li><a href="/vocab/list">📖 教材單字管理</a></li>
            <li><a href="/quiz/list">📝 測驗題目管理</a></li>
            <li><a href="/feedback/list">💬 意見回饋</a></li>
            <hr style="margin: 15px 20px; border-color: rgba(0,0,0,0.1);">
            <li><a href="{{ url_for('admin_logout') }}" style="color: #d9534f;">🚪 登出系統</a></li>
        </ul>
    </aside>

    <main class="main-content">
        
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 style="color: #5c8364; font-weight: bold;">👤 使用者點數管理</h3>
        </div>
        
        <div class="card shadow-sm border-0">
            <div class="card-body p-0">
                <table class="table table-hover mb-0 align-middle">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>名稱</th>
                            <th>目前點數</th>
                            <th>快速調整點數</th>
                            <th>管理</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for c in customers %}
                        <tr>
                            <td>{{ c.id }}</td>
                            <td class="fw-bold">{{ c.username or '未設定' }}</td>
                            <td><span class="pts-tag">{{ c.j_pts }} P</span></td>
                            <td>
                                <form action="/customer/adjust_pts/{{ c.id }}" method="POST" class="d-flex gap-2">
                                    <input type="number" name="amount" class="form-control form-control-sm" style="width: 100px;" placeholder="+/- 點數">
                                    <button type="submit" class="btn btn-sm btn-update">更新</button>
                                </form>
                            </td>
                            <td>
                                <form action="/customer/delete/{{ c.id }}" method="POST" onsubmit="return confirm('確定刪除？');">
                                    <button type="submit" class="btn btn-sm btn-outline-danger">刪除</button>
                                </form>
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
