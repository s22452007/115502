<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>修改密碼</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --green: #5c8364; --green-light: #dce7de; --bg: #f4f7f5; }
        * { box-sizing: border-box; }
        body { background: var(--bg); font-family: "微軟正黑體", sans-serif; color: #444; margin: 0; }
        .layout { display: flex; min-height: 100vh; }
        .sidebar { width: 220px; background: white; box-shadow: 2px 0 10px rgba(0,0,0,0.04); padding: 24px 0; flex-shrink: 0; position: sticky; top: 0; height: 100vh; overflow-y: auto; }
        .sidebar-logo { display: flex; align-items: center; gap: 10px; padding: 0 20px 20px; border-bottom: 1px solid #eee; margin-bottom: 12px; }
        .sidebar-logo .icon-box { width: 36px; height: 36px; background: var(--green-light); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: var(--green); font-weight: bold; }
        .sidebar-logo .title { color: var(--green); font-weight: bold; font-size: 1rem; line-height: 1.2; }
        .sidebar-logo .subtitle { color: #aaa; font-size: 0.7rem; margin-top: 2px; }
        .sidebar-menu { list-style: none; padding: 0; margin: 0; }
        .sidebar-menu a { display: flex; align-items: center; gap: 10px; padding: 12px 20px; color: #666; text-decoration: none; font-size: 0.95rem; transition: 0.2s; }
        .sidebar-menu a:hover { background: var(--bg); color: var(--green); }
        .sidebar-menu a.active { background: var(--green-light); color: var(--green); font-weight: bold; border-right: 4px solid var(--green); }
        .main-content { flex: 1; padding: 40px 48px; }
    </style>
</head>
<body>
<div class="layout">
    <aside class="sidebar">
        <div class="sidebar-logo">
            <div class="icon-box">JL</div>
            <div>
                <div class="title">JLens</div>
                <div class="subtitle">snap to manage</div>
            </div>
        </div>
        <ul class="sidebar-menu">
            <li><a href="/dashboard">🏠 首頁</a></li>
            <li><a href="/user/list">👤 使用者資料</a></li>
            <li><a href="/customer/list">💰 點數管理</a></li>
            <li><a href="/purchase/list">🛒 購買紀錄</a></li>
            <li><a href="/photo/list">🖼️ 照片管控</a></li>
            <li><a href="/vocab/list">📖 教材單字管理</a></li>
            <li><a href="/quiz/list">📝 測驗題目管理</a></li>
            <li><a href="/feedback/list">💬 意見回饋</a></li>
            <hr style="margin: 15px 20px; border-color: rgba(0,0,0,0.1);">
            <li><a href="/admin/change_password" class="active">🔑 修改密碼</a></li>
            <li><a href="{{ url_for('admin_logout') }}" style="color:#d9534f;">🚪 登出系統</a></li>
        </ul>
    </aside>

    <main class="main-content">
        <h3 style="color: var(--green); font-weight: bold; margin-bottom: 8px;">🔑 修改密碼</h3>
        <p class="text-muted mb-4">目前登入帳號：<strong>{{ admin_user }}</strong></p>

        {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
        {% endif %}
        {% if success %}
        <div class="alert alert-success">{{ success }}</div>
        {% endif %}

        <div class="card border-0 shadow-sm" style="max-width: 480px; border-radius: 16px; overflow: hidden;">
            <div class="card-body p-4">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-bold">目前密碼</label>
                        <input type="password" name="current_password" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">新密碼</label>
                        <input type="password" name="new_password" class="form-control" required placeholder="至少 6 個字元">
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-bold">確認新密碼</label>
                        <input type="password" name="confirm_password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn w-100" style="background: var(--green); color: white;">更新密碼</button>
                </form>
            </div>
        </div>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
