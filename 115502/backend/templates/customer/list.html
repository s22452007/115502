<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>使用者管理</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="background: #eff2f0;">
    <div class="container mt-5">
        <div class="d-flex justify-content-between mb-4">
            <h2 style="color: #5b6b61;">👤 使用者管理清單</h2>
            <a href="/" class="btn btn-outline-secondary">回首頁</a>
        </div>
        <div class="card shadow-sm"><div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-dark"><tr><th>ID</th><th>名稱</th><th>Email</th><th>註冊時間</th><th>管理操作</th></tr></thead>
                <tbody>
                    {% for c in customers %}
                    <tr>
                        <td>{{ c.id }}</td><td>{{ c.username or '未設定' }}</td><td>{{ c.email }}</td><td>{{ c.created_at }}</td>
                        <td>
                            <form action="/customer/delete/{{ c.id }}" method="POST" class="d-inline" onsubmit="return confirm('確定刪除此使用者？');">
                                <button type="submit" class="btn btn-sm btn-danger">刪除</button>
                            </form>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div></div>
    </div>
</body>
</html>
