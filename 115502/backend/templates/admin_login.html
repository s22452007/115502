<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>JLens 管理者登入</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { height: 100vh; display: flex; font-family: "微軟正黑體", sans-serif; }

        /* ===== 左側品牌區 ===== */
        .brand-side {
            width: 45%;
            background: #4a7a54;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 60px 56px;
            position: relative;
            overflow: hidden;
        }

        /* 裝飾圓形 */
        .brand-side::before {
            content: '';
            position: absolute;
            width: 320px; height: 320px;
            border-radius: 50%;
            background: rgba(255,255,255,0.06);
            top: -80px; right: -80px;
        }
        .brand-side::after {
            content: '';
            position: absolute;
            width: 200px; height: 200px;
            border-radius: 50%;
            background: rgba(255,255,255,0.05);
            bottom: -40px; left: -40px;
        }

        .brand-tag {
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 3px;
            color: rgba(255,255,255,0.5);
            text-transform: uppercase;
            margin-bottom: 20px;
        }
        .brand-title {
            font-size: 3.2rem;
            font-weight: 900;
            color: white;
            line-height: 1.1;
            letter-spacing: -1px;
            margin-bottom: 16px;
        }
        .brand-subtitle {
            font-size: 1rem;
            color: rgba(255,255,255,0.6);
            line-height: 1.6;
            margin-bottom: 48px;
        }
        .brand-divider {
            width: 48px;
            height: 4px;
            background: rgba(255,255,255,0.3);
            border-radius: 2px;
            margin-bottom: 32px;
        }
        .brand-stats {
            display: flex;
            gap: 32px;
        }
        .brand-stat .num {
            font-size: 1.6rem;
            font-weight: 900;
            color: white;
            line-height: 1;
        }
        .brand-stat .lbl {
            font-size: 0.72rem;
            color: rgba(255,255,255,0.5);
            margin-top: 4px;
        }

        /* ===== 右側表單區 ===== */
        .form-side {
            flex: 1;
            background: #f2f4f3;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px 48px;
        }
        .form-box {
            width: 100%;
            max-width: 360px;
        }
        .form-heading {
            font-size: 1.8rem;
            font-weight: 900;
            color: #1a1a1a;
            margin-bottom: 6px;
        }
        .form-subheading {
            font-size: 0.85rem;
            color: #aaa;
            margin-bottom: 36px;
        }
        .field-label {
            font-size: 0.78rem;
            font-weight: 700;
            color: #888;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }
        .form-control, .form-select {
            background: white;
            border: 1.5px solid #e8e8e8;
            border-radius: 12px;
            padding: 12px 16px;
            font-size: 0.92rem;
            color: #333;
            transition: border-color 0.2s;
        }
        .form-control:focus, .form-select:focus {
            border-color: #4a7a54;
            box-shadow: 0 0 0 3px rgba(74,122,84,0.12);
        }
        .input-group .form-control {
            border-radius: 12px 0 0 12px;
            border-right: none;
        }
        .input-group .btn {
            border-radius: 0 12px 12px 0;
            border: 1.5px solid #e8e8e8;
            border-left: none;
            background: white;
            color: #999;
        }
        .input-group .form-control:focus ~ .btn {
            border-color: #4a7a54;
        }
        .btn-login {
            width: 100%;
            padding: 14px;
            background: #4a7a54;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 800;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 8px;
        }
        .btn-login:hover { background: #3d6645; }
        .error-box {
            background: #fce4ec;
            color: #c2185b;
            border-radius: 10px;
            padding: 10px 16px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <!-- 左側品牌區 -->
    <div class="brand-side">
        <div class="brand-tag">Admin Panel</div>
        <div class="brand-title">JLens<br>後台系統</div>
        <div class="brand-divider"></div>
        <div class="brand-subtitle">管理使用者、教材與意見回饋<br>讓學習體驗持續優化</div>
        <div class="brand-stats">
            <div class="brand-stat">
                <div class="num">8</div>
                <div class="lbl">管理功能</div>
            </div>
            <div class="brand-stat">
                <div class="num">5</div>
                <div class="lbl">管理者帳號</div>
            </div>
        </div>
    </div>

    <!-- 右側表單區 -->
    <div class="form-side">
        <div class="form-box">
            <div class="form-heading">歡迎回來</div>
            <div class="form-subheading">請選擇帳號並輸入密碼</div>

            {% if error %}
            <div class="error-box"><i class="bi bi-exclamation-circle me-1"></i>{{ error }}</div>
            {% endif %}

            <form action="{{ url_for('admin_login') }}" method="POST">
                <div class="mb-4">
                    <div class="field-label">管理者帳號</div>
                    <select name="username" class="form-select" required autofocus>
                        <option value="" disabled selected>請選擇帳號...</option>
                        <option value="11156001">11156001</option>
                        <option value="11156006">11156006</option>
                        <option value="11156015">11156015</option>
                        <option value="11156039">11156039</option>
                        <option value="11156047">11156047</option>
                    </select>
                </div>

                <div class="mb-4">
                    <div class="field-label">密碼</div>
                    <div class="input-group">
                        <input type="password" name="password" id="adminPassword"
                               class="form-control" placeholder="輸入密碼" required>
                        <button class="btn" type="button" id="togglePassword">
                            <i id="eyeIcon" class="bi bi-eye-slash-fill"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn-login">登入系統</button>
            </form>
        </div>
    </div>

    <script>
        const toggleBtn = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('adminPassword');
        const eyeIcon = document.getElementById('eyeIcon');
        toggleBtn.addEventListener('click', function () {
            const isPassword = passwordInput.getAttribute('type') === 'password';
            passwordInput.setAttribute('type', isPassword ? 'text' : 'password');
            eyeIcon.className = isPassword ? 'bi bi-eye-fill' : 'bi bi-eye-slash-fill';
        });
    </script>
</body>
</html>
